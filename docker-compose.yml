services:

  postgres:
    image: postgres:15
    container_name: unitic-db

    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devilyxrd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devilyxrdwashere123}
      POSTGRES_DB: ${POSTGRES_DB:-cms}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: unitic-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:3002}
      DATABASE_URL: postgresql://${POSTGRES_USER:-devilyxrd}:${POSTGRES_PASSWORD:-devilyxrdwashere123}@postgres:5432/${POSTGRES_DB:-cms}
      UPLOAD_DIR: /app/apps/api/uploads
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/apps/api/uploads

volumes:
  postgres_data:
  uploads_data:
